<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Convolving — Logo v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>body{margin:0;font-family:'DM Sans',sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
const INK = '#0b0c11';
const ACC = '#0b0c11';

/* ═══════════════════════════════════════════
   Definition of convolution:
   (f * g)(t) = ∫ f(τ) g(t-τ) dτ
   — two functions sliding over each other,
   multiplied point-by-point, integrated into one.
   ═══════════════════════════════════════════ */

/* Option 1 — Integral & overlap
   The ∫ symbol, with a second curve sliding through it.
   Two signals meeting → one integrated whole. */
function LogoIntegral({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {/* Integral sign — the f */}
      <path
        d="M 40 18 C 40 14, 46 14, 48 16 L 48 18
           C 48 18, 44 17, 44 22 L 44 78 C 44 83, 40 84, 38 82 L 38 80
           C 38 80, 42 81, 42 76 L 42 22 C 42 17, 46 17, 44 14 Z"
        fill={color}
      />
      {/* Cleaner stroke integral */}
    </svg>
  );
}

/* Cleaner integral + sliding wave */
function LogoIntegralV2({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {/* ∫ — the integral stroke */}
      <path
        d="M 52 20 Q 52 12, 44 12 Q 38 12, 38 20
           L 38 80 Q 38 88, 44 88 Q 52 88, 52 80"
        fill="none" stroke={color} strokeWidth="6" strokeLinecap="round"
      />
      {/* Sliding sine wave (g) passing through */}
      <path
        d="M 14 50 Q 28 32, 44 50 T 74 50 T 88 50"
        fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" opacity="0.45"
      />
    </svg>
  );
}

/* Option 2 — Sliding kernel (two discs crossing)
   One circle sliding over another, creating overlap (the lens/vesica). */
function LogoLens({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      <circle cx="36" cy="50" r="26" fill="none" stroke={color} strokeWidth="3"/>
      <circle cx="64" cy="50" r="26" fill="none" stroke={color} strokeWidth="3"/>
      {/* The integral — the intersection */}
      <path
        d="M 50 26.5 A 26 26 0 0 1 50 73.5 A 26 26 0 0 1 50 26.5 Z"
        fill={color}
      />
    </svg>
  );
}

/* Option 3 — Two waves combining into one (stacked signal)
   Reads as f(x), g(x), and (f*g)(x) — the actual output. */
function LogoWaves({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {/* top: high-freq wave */}
      <path d="M 12 30 Q 20 20, 28 30 T 44 30 T 60 30 T 76 30 T 88 30"
        fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity="0.35"/>
      {/* mid: low-freq wave */}
      <path d="M 12 50 Q 32 38, 50 50 T 88 50"
        fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity="0.55"/>
      {/* bottom: convolved output — richer shape */}
      <path d="M 12 72 Q 20 62, 28 72 Q 36 82, 50 66 Q 64 50, 72 72 Q 80 84, 88 72"
        fill="none" stroke={color} strokeWidth="4" strokeLinecap="round"/>
    </svg>
  );
}

/* Option 4 — Möbius / braid
   Two strands convolving into an inseparable whole. */
function LogoBraid({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {/* Strand A */}
      <path
        d="M 20 32 C 34 32, 34 68, 50 68 C 66 68, 66 32, 80 32"
        fill="none" stroke={color} strokeWidth="5" strokeLinecap="round"
      />
      {/* Strand B (crosses behind at center) */}
      <path
        d="M 20 68 C 34 68, 34 52, 46 50"
        fill="none" stroke={color} strokeWidth="5" strokeLinecap="round" opacity="0.45"
      />
      <path
        d="M 54 50 C 66 48, 66 32, 80 68"
        fill="none" stroke={color} strokeWidth="5" strokeLinecap="round" opacity="0.45"
      />
    </svg>
  );
}

/* Option 5 — Aperture / eclipse
   A sliding disc crossing a fixed one — the moment of maximum overlap. */
function LogoEclipse({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      <defs>
        <clipPath id="diskA">
          <circle cx="42" cy="50" r="28"/>
        </clipPath>
      </defs>
      {/* Fixed disc (outline) */}
      <circle cx="42" cy="50" r="28" fill="none" stroke={color} strokeWidth="2.5"/>
      {/* Sliding disc — filled */}
      <circle cx="62" cy="50" r="28" fill={color}/>
      {/* Restore outline over filled disk (overlap region = negative space effect) */}
      <circle cx="42" cy="50" r="28" fill="none" stroke={color} strokeWidth="2.5"/>
      {/* tiny trailing dots — the slide */}
      <circle cx="14" cy="50" r="1.5" fill={color} opacity="0.3"/>
      <circle cx="22" cy="50" r="1.5" fill={color} opacity="0.5"/>
      <circle cx="86" cy="50" r="1.5" fill={color} opacity="0.3"/>
    </svg>
  );
}

/* Option 6 — Echo (one shape convolving with itself)
   A mark that repeats with decay — like an impulse response. */
function LogoEcho({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {[0,1,2,3,4].map(i=>{
        const x = 20 + i*14;
        const op = 1 - i*0.18;
        const r = 3 + i*0.5;
        return <circle key={i} cx={x} cy="50" r={r} fill={color} opacity={op}/>;
      })}
      {/* trailing wave envelope */}
      <path d="M 16 50 Q 50 20, 84 50" fill="none" stroke={color} strokeWidth="1.5" opacity="0.25"/>
      <path d="M 16 50 Q 50 80, 84 50" fill="none" stroke={color} strokeWidth="1.5" opacity="0.25"/>
    </svg>
  );
}

/* Option 7 — The convolution mark
   An impulse spike convolving with a smooth kernel → a smooth curve.
   The clearest textbook depiction, rendered as a single elegant glyph. */
function LogoImpulse({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {/* impulse (left) */}
      <line x1="22" y1="70" x2="22" y2="30" stroke={color} strokeWidth="3" strokeLinecap="round"/>
      <circle cx="22" cy="28" r="3" fill={color}/>
      {/* arrow / flow */}
      <path d="M 34 50 Q 42 50, 44 50" stroke={color} strokeWidth="1.5" fill="none" opacity="0.4"/>
      {/* convolved curve (right) — bell */}
      <path
        d="M 40 70 Q 50 70, 56 58 Q 62 38, 70 38 Q 78 38, 84 58 Q 88 70, 92 70"
        fill="none" stroke={color} strokeWidth="3" strokeLinecap="round"
      />
    </svg>
  );
}

/* Option 8 — Sliding dot under curve (the "t" parameter)
   A single dot sliding beneath an arch — the essence of the definition. */
function LogoSlide({ size = 128, color = INK }){
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 100 100">
      {/* arch — f */}
      <path d="M 14 72 Q 50 14, 86 72"
        fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
      {/* baseline */}
      <line x1="14" y1="72" x2="86" y2="72" stroke={color} strokeWidth="1" opacity="0.25"/>
      {/* sliding kernel — a filled circle on the baseline */}
      <circle cx="62" cy="72" r="6" fill={color}/>
      {/* trailing ghost */}
      <circle cx="48" cy="72" r="4" fill={color} opacity="0.35"/>
      <circle cx="38" cy="72" r="3" fill={color} opacity="0.2"/>
    </svg>
  );
}

/* ═══════════════════════════════════════════
   UI helpers
   ═══════════════════════════════════════════ */
function BrowserTab({ Logo, dark=false }){
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',
      background:dark?'#2a2a2a':'#e7e8ea',borderRadius:'10px 10px 0 0',width:260,
      fontFamily:'system-ui',fontSize:13,color:dark?'#d9d9d9':'#333',
      border:'1px solid '+(dark?'#1a1a1a':'#c7c8ca'),borderBottom:'none'}}>
      <div style={{width:16,height:16,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Logo size={16} color={dark?'#eef0f4':'#0b0c11'}/>
      </div>
      <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Convolving — AI Advisory</span>
      <span style={{marginLeft:'auto',opacity:.5}}>×</span>
    </div>
  );
}

function FaviconStrip({ Logo }){
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:18}}>
      {[16,20,24,32,48,64].map(s=>(
        <div key={s} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
          <div style={{width:s,height:s,display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',border:'1px solid #e4e0d8'}}>
            <Logo size={s}/>
          </div>
          <span style={{fontFamily:'JetBrains Mono',fontSize:9,color:'#8a8276'}}>{s}px</span>
        </div>
      ))}
    </div>
  );
}

function Lockup({ Logo, size=36, dark=false }){
  return (
    <div style={{background:dark?'#0b0c11':'transparent',padding:dark?'20px 24px':0,
      borderRadius:10,display:'inline-flex',alignItems:'center',gap:12}}>
      <Logo size={size} color={dark?'#eef0f4':'#0b0c11'}/>
      <span style={{fontFamily:'Fraunces',fontWeight:400,fontSize:size*0.85,letterSpacing:'-0.035em',
        color:dark?'#eef0f4':'#0b0c11'}}>Convolving</span>
    </div>
  );
}

function AppIcon({ Logo, bg='#fff', color=INK, pad=18 }){
  return (
    <div style={{width:96,height:96,background:bg,borderRadius:22,
      display:'flex',alignItems:'center',justifyContent:'center',padding:pad,boxSizing:'border-box',
      boxShadow:'0 4px 20px rgba(20,40,100,.12),0 1px 2px rgba(0,0,0,.08)'}}>
      <Logo size={96-pad*2} color={color}/>
    </div>
  );
}

function Option({ title, caption, Logo, recommended=false }){
  return (
    <DCArtboard width={680} height={780} label={title}>
      <div style={{padding:'32px 36px',display:'flex',flexDirection:'column',gap:24,height:'100%',boxSizing:'border-box',position:'relative'}}>
        {recommended && (
          <div style={{position:'absolute',top:14,right:14,padding:'4px 10px',borderRadius:999,
            background:'#0b0c11',color:'#fff',fontFamily:'JetBrains Mono',fontSize:10,letterSpacing:'.1em',textTransform:'uppercase'}}>
            Recommended
          </div>
        )}
        <div>
          <div style={{fontFamily:'Fraunces',fontWeight:400,fontSize:22,letterSpacing:'-0.03em',color:INK}}>{title}</div>
          <div style={{fontSize:12.5,color:'#6a6258',marginTop:5,lineHeight:1.55,maxWidth:500}}>{caption}</div>
        </div>
        <div style={{background:'#fafafa',border:'1px solid #ececec',borderRadius:4,
          padding:'36px 24px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Logo size={180}/>
        </div>
        <div style={{fontFamily:'JetBrains Mono',fontSize:10,letterSpacing:'.12em',textTransform:'uppercase',color:'#6a6258'}}>Favicon scaling</div>
        <FaviconStrip Logo={Logo}/>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <BrowserTab Logo={Logo}/>
          <BrowserTab Logo={Logo} dark/>
        </div>
        <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap',marginTop:'auto'}}>
          <AppIcon Logo={Logo}/>
          <AppIcon Logo={Logo} bg="#0b0c11" color="#eef0f4" pad={18}/>
          <Lockup Logo={Logo} size={32}/>
        </div>
      </div>
    </DCArtboard>
  );
}

function App(){
  return (
    <DesignCanvas>
      <div style={{padding:'0 60px 20px',maxWidth:960}}>
        <div style={{fontFamily:'Fraunces',fontWeight:400,fontSize:48,letterSpacing:'-0.04em',color:'#1a1710',marginBottom:12}}>
          Logo v2 — starting from the definition
        </div>
        <div style={{fontSize:14.5,color:'#6a6258',lineHeight:1.6,maxWidth:760}}>
          <span style={{fontFamily:'JetBrains Mono',fontSize:13,color:'#1a1710'}}>(f * g)(t) = ∫ f(τ) g(t−τ) dτ</span> — convolution is two functions sliding over each other, multiplying at each position, integrating into one. Nothing about pixels or lattices. I've thrown those away and explored eight marks built on the actual mathematical ideas: the integral, overlapping signals, sliding kernels, echoes, combined waves. All black monoline glyphs — they hold at 16px and stay type-like next to the wordmark.
        </div>
      </div>

      <DCSection title="Rooted in the integral" subtitle="The most literal translations of the definition">
        <Option
          title="01 · Integral & slide"
          caption="The ∫ symbol paired with a sliding wave passing through it. Reads as mathematical first, brand second — honest about what the firm does."
          Logo={LogoIntegralV2}
        />
        <Option
          title="02 · Sliding kernel"
          caption="Two discs overlapping — the moment of maximum convolution. The filled lens is the integral of the overlap. Clean, no letterform."
          Logo={LogoEclipse}
          recommended
        />
        <Option
          title="03 · Lens / vesica"
          caption="Two circles meeting and the filled intersection. Same idea as 02 with both shapes visible — more 'diagram', less 'mark'."
          Logo={LogoLens}
        />
      </DCSection>

      <DCSection title="Signal & waveform" subtitle="Convolution as two signals combining into one">
        <Option
          title="04 · Stacked signals"
          caption="Three waves stacked: f, g, and f*g. Literally what a convolution produces. Very legible as a 'what we do' glyph."
          Logo={LogoWaves}
        />
        <Option
          title="05 · Impulse → response"
          caption="An impulse spike on the left convolving into a smooth bell curve on the right. The textbook picture of convolution."
          Logo={LogoImpulse}
        />
        <Option
          title="06 · Echo / impulse response"
          caption="A sequence of decaying dots under a soft envelope. Reads as reverberation — a single input convolved through time."
          Logo={LogoEcho}
        />
      </DCSection>

      <DCSection title="More elemental" subtitle="Single-gesture marks">
        <Option
          title="07 · Braid"
          caption="Two strands crossing and becoming one continuous form. The metaphor of two things convolving into an inseparable whole."
          Logo={LogoBraid}
        />
        <Option
          title="08 · Sliding dot under arch"
          caption="A kernel (dot) sliding beneath a function (arch) leaving a trail. Minimal, typographic — sits happily at 16px."
          Logo={LogoSlide}
        />
      </DCSection>

      <DCPostIt top={80} left={1000} rotate={-3} width={230}>
        My pick is <b>02 · Sliding kernel</b> — it's a single geometric gesture, literally depicts convolution, and holds at every size. Want me to refine one of these, or push further in any of these directions?
      </DCPostIt>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
